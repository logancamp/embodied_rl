# S-size config — for RTX 3070 (8GB VRAM)
# This matches the S model from the DreamerV3 paper.
# This is your benchmark config. Results should match paper on Atari100k.
# Run with: python train.py --config configs/s_size.yaml

model:
  deter: 512
  stoch: 32
  classes: 32
  cnn_depth: 32
  units: 512
  mlp_layers: 2

training:
  total_steps: 500000           # Atari100k uses 400k env steps (100k / action_repeat=4)
  seed_steps: 2500
  batch_size: 16
  batch_length: 64
  train_ratio: 512
  replay_size: 1000000

logging:
  log_every: 1000
  eval_every: 10000
  eval_episodes: 5
  checkpoint_every: 50000
  logdir: "logs/s_size"

device: "cuda"
