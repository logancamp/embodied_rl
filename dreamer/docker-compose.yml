Recognized existing research matching user's concept
Yes — and it's been done remarkably close to your exact description. The closest match is a real published paper.

MOTIF (Meta/Mila, ICLR 2024)
This is almost precisely what you described. MOTIF bridges the gap between an LLM's high-level knowledge and a decision-making agent by deriving an intrinsic reward function from a pretrained LLM, then using it to train agents via RL. 
arXiv

The key insight: evaluating is often easier than generating — instead of understanding every detail of the observations or actions, an LLM can inform an agent by just saying whether an event is good or bad, without requiring any complete language interface. 
Mila

How it works in 3 phases:

Dataset annotation: use an LLM's preferences on pairs of captioned observations to create an annotated dataset 
GitHub
Reward training: distill those +/- preferences into a scalar reward function
RL training: train an agent using that reward, with or without game score signals
Agents trained exclusively with MOTIF's intrinsic reward surprisingly outperform agents trained using the game score itself. 
Mila

ONI (Facebook Research, 2025)
ONI goes further — a distributed architecture that simultaneously learns an RL policy and an intrinsic reward function using LLM feedback online, removing the need for large offline datasets. 
arXiv
 One of its reward modeling approaches builds a binary classification model to distill sentiment labels returned by the LLM 
Umass
 — literally a positive/negative classifier as the reward signal, exactly as you imagined.

What's Still Missing for Your Goal (Pure Visual, Any Game)
Both MOTIF and ONI still use text captions from the game (e.g., NetHack's message log) rather than raw pixels. The gap to your idea:

They caption frames with text → feed text to LLM → get +/- label
Your idea: feed raw pixels to a VLM → get +/- label directly
That last step is increasingly viable now with GPT-4o / Gemini 2.0 Flash doing real-time vision. Nobody has fully closed the loop on pure pixel-in → VLM sentiment → RL policy → keyboard out for arbitrary games, which means there's genuinely open research space here.

