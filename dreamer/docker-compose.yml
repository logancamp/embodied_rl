The first idea is more interesting theoretically but only if you solve the meta-objective problem cleanly. Without that it's complexity for its own sake.

The second idea will almost certainly work better in a first prototype and teach you whether the consolidation behavior is even doing what you think it is.

Most likely path to something genuinely novel: build the second, prove it works, then replace the fixed plasticity rule with a learned function and show it outperforms. That's a paper. Jumping straight to the first without the second as a baseline is building on sand.

