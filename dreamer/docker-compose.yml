Orchestrated conversational walkthrough of four foundational ML papers
Orchestrated conversational walkthrough of four foundational ML papers
Sure. Let's just talk through them. I'll keep it practical and skip the math.

DQN — the core idea
You have a CNN that looks at game frames and outputs a Q-value for every possible action. Q-value just means "how good is it to take this action from this state." You pick the highest one, take that action, observe what happens, and update the network.

The two tricks that made it work were experience replay (store past transitions, sample randomly to break correlation) and a target network (a frozen copy of the network you update against, so you're not chasing a moving target). Without those two things it just destabilizes.

For your project DQN is basically the conceptual ancestor but you probably wouldn't use it directly — it's off-policy and discrete actions only. What do you remember about why you'd reach for PPO instead?

PPO — why it replaced DQN for most things
PPO is on-policy — you run the current policy, collect experience, update, throw the experience away, repeat. The key insight is the clipped objective — it stops the update from changing the policy too drastically in one step. That stability is why it's the default workhorse.

For your use case PPO matters because it handles continuous action spaces better and plays nicer with the kind of noisy reward signal CLIP will give you.

LoRA — you already know this but in RL context
You know LoRA from fine-tuning LLMs — freeze the base, inject low-rank matrices, only train those. The conceptual transplant to your system is: base model learns general visual-motor patterns across games, LoRA adapter per game bends that behavior cheaply.

The question worth thinking about is where you inject the adapters. In LLMs it's attention layers. In your CNN/transformer policy it's less obvious — probably the later layers where abstract representations live rather than early visual layers.

DreamerV3 — the important shift
This is the one most worth understanding for your design. The key idea is the agent never trains directly on real game frames during RL. Instead it learns a world model — a compressed latent representation of the game — and then trains the policy entirely inside that latent space by imagining trajectories.

Real environment interaction just updates the world model. Policy training happens in imagination. This is why it's so sample efficient — you can imagine thousands of trajectories per real frame.

For your architecture this matters because the world model is essentially a game-agnostic compression layer — exactly where your shared base should live. The adapters would then live in the policy head that operates on top of those latent representations.

