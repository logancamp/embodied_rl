Synthesized relevant papers across multiple machine learning domains
Synthesized relevant papers across multiple machine learning domains
Foundational RL from Pixels
DQN — Mnih et al. 2015, Human-level control through deep reinforcement learning (Nature). The original Atari pixel RL paper.
PPO — Schulman et al. 2017. The training algorithm you'd almost certainly use.
IMPALA — Espeholt et al. 2018. Multi-task RL at scale, shared representations across games.
DrQ / DrQ-v2 — Yarats et al. 2021. Data-efficient RL from pixels, important for sample efficiency problem.
Multi-Game / Generalist Agents (Your Base Model)
Gato — Reed et al. 2022 (DeepMind). One transformer, many games. Closest existence proof of your base model idea.
MuZero — Schrittwieser et al. 2020. Learns a world model purely from visual input, no game rules given.
UniPi — Du et al. 2023. Learning a universal policy across tasks.
Visual Reward Signals (Your CLIP Reward)
CLIP — Radford et al. 2021 (OpenAI). The base model you'd use for reward.
MOTIF — Klissarov et al. 2023/ICLR 2024. LLM-derived intrinsic reward for RL. Most directly related to your reward idea.
RL-VLM-F — 2024. Reinforcement learning from vision-language model feedback. Closest to pure visual reward via VLM.
CLIP4Clip / VIP — reward shaping using CLIP embeddings in robotics. Shows CLIP reward instability issues you'll face.
Adapter / Transfer Learning (Your LoRA Layer)
LoRA — Hu et al. 2022. The core adapter technique. Lightweight, must-read.
AdapterHub / Houlsby et al. 2019. Original adapter paper for transformers.
Progressive Neural Networks — Rusu et al. 2016 (DeepMind). Adds a column per new task, freezes old ones. Directly relevant to your spawn-new-adapter idea.
PTGM — Pre-trained goal-conditioned models with adapters for new tasks. Recent, very relevant.
Continual Learning / When to Reuse vs. Spawn (Your Hardest Problem)
PackNet — Mallya & Lazebnik 2018. Packs multiple tasks into one network via weight masking.
EWC (Elastic Weight Consolidation) — Kirkpatrick et al. 2017. Prevents catastrophic forgetting, foundational.
Task2Vec — Achille et al. 2019. Measures task similarity via Fisher embeddings — directly relevant to your similarity gate idea.
CURL — Laskin et al. 2020. Contrastive learning for RL representations, useful for similarity measurement.
Hierarchical RL / Primitive Actions (Your Control Grammar)
Options Framework — Sutton, Precup & Singh 1999. The theoretical foundation for reusable sub-policies.
HIRO — Nachum et al. 2018. Hierarchical RL with learned primitives.
Director — Hafner et al. 2022. Hierarchical world models with goal-directed behavior.
World Models (Bonus — Makes Everything More Sample Efficient)
DreamerV3 — Hafner et al. 2023. Learns to play games by imagining trajectories, dramatically cuts real environment samples needed. If you're serious about sample efficiency, this is the most important recent paper.
Suggested Reading Order
DQN → PPO (foundations)
CLIP → MOTIF → RL-VLM-F (reward signal)
LoRA → Progressive Neural Networks (adapter system)
Task2Vec → EWC (similarity gate)
Gato → DreamerV3 (where the field is now)
That's roughly 3-4 weeks of reading if you go deep on each. DreamerV3 + LoRA adapters + CLIP reward is probably the tightest modern stack to actually build your idea on.

