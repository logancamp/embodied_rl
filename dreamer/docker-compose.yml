Latency — VLM APIs add 1–3s lag; fine for turn-based games, hard for action games
Reward signal — RL needs a reward; you either read pixels at a known location (health bar color), use OCR, or hook game memory (for emulators via libretro)
Emulators — if targeting retro games, OpenAI Gym's ALE (Atari) or gym-retro give you frames + rewards out of the box
