# docker-compose.yml — DreamerV3 training container
#
# Usage:
#   docker compose up          # full S-size training run
#   docker compose run debug   # XS debug run
#   docker compose run shell   # interactive shell inside container
 
services:
 
  # ── Full training run (S model, RTX 3070) ────────────────────────────────────
  train:
    build: .
    image: dreamerv3
    command: python train.py --configs configs/base.yaml configs/s_size.yaml
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      # Mount logs directory so results persist after container exits
      - ./logs:/dreamer/logs
    environment:
      - PYTHONUNBUFFERED=1    # see print output immediately
 
  # ── Debug run (XS model, smoke test) ─────────────────────────────────────────
  debug:
    build: .
    image: dreamerv3
    command: python train.py --configs configs/base.yaml configs/debug.yaml
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./logs:/dreamer/logs
    environment:
      - PYTHONUNBUFFERED=1
 
  # ── Interactive shell for debugging ──────────────────────────────────────────
  shell:
    build: .
    image: dreamerv3
    entrypoint: /bin/bash
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./logs:/dreamer/logs
      - .:/dreamer    # live mount — code changes reflect immediately
    environment:
      - PYTHONUNBUFFERED=1
 
