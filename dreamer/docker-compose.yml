You were mixing up which component owns what. To be precise:

Plasticity is a property of weights across all components, not a separate component
CLIP replaces or augments the reward signal going into the reward head, not the encoder
LoRA adapters live in actor/critic, not in the world model
World model stays mostly vanilla Dreamer — it just gets a better reward signal and plastic weights
