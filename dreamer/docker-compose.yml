Yeah, you're right — and it's a great instinct. You don't need an LLM at all. The LLM is just one way to get a +/- signal. Here are lighter options ranked by weight:

Lightest: Pixel Heuristics
Just read specific pixels directly.

Health bar going red → negative
Score counter increasing → positive
"Game Over" text appearing → negative
No model at all. Surprisingly effective if you're targeting specific games. Brittle across games though.

Light: CLIP (the sweet spot for your idea)
This is probably what you actually want.

python
from transformers import CLIPModel, CLIPProcessor

model = CLIPModel.from_pretrained("openai/clip-vit-base-patch32")  # ~400MB

# Zero-shot reward signal
labels = ["winning, good game state, progressing",
          "dying, losing, game over, bad state"]

# Get similarity scores → use as reward
CLIP can do zero-shot image "sentiment" with no fine-tuning. You just describe what "good" and "bad" look like in natural language. It runs locally, no API calls, ~50ms per frame on GPU.

Medium: Fine-tuned Small CNN
Label ~500 frames manually as good/bad, train a tiny ResNet or MobileNet. Fast at inference, very accurate for one specific game.

The Real Problem
The challenge isn't model size — it's correctness. Consider:

A dark, scary dungeon screen might look negative visually but the agent just found great loot
An explosion looks intense but it means you killed an enemy
LLMs are used because they have semantic game knowledge, not because classification is hard. CLIP partially solves this because it understands concepts like "health" and "victory" — a pure vision model trained on ImageNet wouldn't.

CLIP zero-shot is genuinely the right starting point. Fast, local, no training needed, works across games. Worth prototyping.

