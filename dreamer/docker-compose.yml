Clarified DreamerV3's reward sourcing and per-game training methodology
Clarified DreamerV3's reward sourcing and per-game training methodology
Two really important questions — and the answers directly shape your design.

Rewards — From the System, Not Visuals
Yes, DreamerV3 takes rewards from the environment directly. The game hands it a scalar — score increased, health decreased, level completed. The world model then learns to predict those rewards from latent states, but the ground truth signal always comes from the environment.

This is exactly the gap your idea fills. You're proposing to replace that environment scalar with a CLIP-derived visual signal — so the agent has no privileged access to game internals at all. Dreamer wasn't designed for that but it's not incompatible with it.

Retraining — This is the Critical Gap
DreamerV3's headline claim is that the same hyperparameters work across all games. But it still trains a completely separate model per game. There's no shared base, no transfer, no reuse of what it learned playing Atari when it starts Minecraft.

So the architecture is general but the weights are not shared. Each game starts from scratch.

This is precisely what you'd be adding that Dreamer doesn't have. To be clear about the gap:

DreamerV3:
Game A → train full model → weights A
Game B → train full model → weights B
         (no relationship between them)

Your idea:
Game A → train full model → shared base + adapter A
Game B → freeze base, train adapter B
         (base weights reused, only adapter is new)
Why That Distinction Matters for Your Design
Since Dreamer retrains fully per game, the encoder and RSSM have never been forced to learn transferable representations. They learn whatever is optimal for that one game. You'd need to explicitly train across multiple games simultaneously to force the base to learn something general — otherwise the "shared base" just overfits to your first game.

This is actually the hardest part of your whole system — not the adapters, but forcing the base to stay general rather than game-specific during initial training.

So Your Real Design Question
Do you:

A) Train Dreamer on many games simultaneously from the start, forcing shared representations, then freeze and add adapters for new games. Expensive upfront, cleaner transfer.

B) Train on one game, then use continual learning techniques (like EWC) to add new games without forgetting, hoping generalization emerges. Cheaper to start, messier in practice.

C) Use a pretrained visual backbone (CLIP encoder frozen) as the encoder from day one, so the base is already general before any RL training. Sidesteps the problem somewhat.

Option C is probably your most practical starting point — it borrows generalization from CLIP rather than having to learn it from scratch. Your thoughts?

