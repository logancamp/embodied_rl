def update_plasticity(plasticity, recent_gradients):
    consistency = 1 - variance(recent_gradients)
    # high consistency → lower plasticity
    # high variance → higher plasticity (still learning)
    return smooth(plasticity, consistency, tau)
Smooth update with a time constant tau so it doesn't thrash. Tau is your "how quickly do patterns consolidate" knob — equivalent to the brain's critical period length.

