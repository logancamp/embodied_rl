Good call to step back. Let me walk through Dreamer's internals cleanly before we layer anything on top.

The Three Distinct Components
DreamerV3 has three parts that are conceptually separate even though they train simultaneously:

World Model     → understands the environment
Actor           → decides what to do
Critic          → judges how good a situation is
They interact in a specific way. Let's go through each properly.

World Model — The Core
This is Dreamer's real innovation. It has four sub-parts:

Encoder

pixels → CNN → embedding vector
Just a CNN. Compresses raw frames into a dense vector. No magic here. This is the only place raw pixels ever enter the system.

RSSM (Recurrent State Space Model) This is the heart. Takes the encoder output and maintains a latent state with two parts:

Deterministic state (h):
    GRU hidden state
    carries memory across timesteps
    "what has been happening"
    
Stochastic state (z):
    sampled from a distribution
    represents uncertainty
    "what might be true right now"

Together: (h, z) = full latent state
At each timestep:

previous (h, z) + current encoder output 
    → new h via GRU
    → new z sampled from distribution conditioned on h
Prediction Heads From the latent state (h, z) it predicts three things:

Decoder     → reconstructs the image (trains encoder indirectly)
Reward head → predicts reward signal
Continue head → predicts if episode is still ongoing
These heads are how the world model trains. It's just prediction — predict the next frame, predict the reward, predict whether you're still alive. No RL signal touches the world model directly.

What the world model learns: How the world works. Cause and effect. What happens when you take an action. All from predicting futures.

How World Model Trains
Loss has three terms:

Reconstruction loss    → predicted frame vs actual frame
Reward prediction loss → predicted reward vs actual reward
KL loss               → keeps stochastic state well-behaved
                        (this is your free novelty signal)
Backprop flows through all of this. The encoder, RSSM, and prediction heads all update together on these losses. No policy gradient touches the world model.

Actor and Critic — The Policy Side
These never see raw pixels. Ever. They only see latent states (h, z) produced by the world model.

Actor

latent state (h, z) → small MLP → action distribution → sample action
Outputs a probability distribution over actions. You sample from it to get the actual action taken.

Critic

latent state (h, z) → small MLP → scalar value estimate
Estimates how much total future reward you'll get from this state. Just a number.

The Imagination Loop — How Actor/Critic Train
This is the key mechanism. Actor and critic never train on real experience:

1. Take a real latent state as starting point
2. Actor picks an action
3. RSSM predicts next latent state (no real environment needed)
4. Reward head predicts reward for that transition
5. Repeat for 15 steps
6. Critic evaluates the trajectory
7. Actor updates to take actions that lead to better critic scores
8. Critic updates toward actual imagined returns
The world model is used as a simulator. Actor and critic train entirely inside it. Real environment interaction only happens to keep the world model accurate.

The Interaction Pattern
Real environment interaction:
    Agent acts → gets real frame + real reward
    World model updates on this real experience
    (encoder, RSSM, prediction heads all update)

Imagination (happens much more frequently):
    World model simulates trajectories
    Actor/critic train on imagined experience
    (world model weights frozen during this)
This separation is critical. The world model and the policy train on fundamentally different signals with different frequencies.

The Clean Conceptual Split
World model asks:  "what is true about this environment?"
Actor asks:        "what should I do given what's true?"
Critic asks:       "how good is what's true right now?"
They're coupled through the latent state but their objectives are completely different.

Now Where Your Ideas Plug In
With this clear, the integration points become obvious:

Encoder (CNN)
    → your added CLIP module sits alongside this
    → provides visual reward signal to reward head

RSSM
    → KL divergence here is your free novelty signal
    → feeds into plasticity meta-objective
    → this is the world model region, high default plasticity

Reward head
    → prediction error here is your correctness signal
    → also feeds into plasticity meta-objective

Actor/Critic (LoRA region)
    → low default plasticity
    → game-specific adapters live here
    → plasticity still operates but starts conservative
