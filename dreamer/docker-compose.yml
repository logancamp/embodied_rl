You're describing something really close to how the brain actually works. And neuroscience has a lot to say about it.

The Core Principle: Synaptic Consolidation
The brain doesn't freeze weights manually — it regulates how plastic each synapse is based on how often and consistently it's been used.

Hebbian Learning — "neurons that fire together wire together." The more consistently two neurons activate together, the stronger and more resistant to change that connection becomes. Frequent consistent patterns self-stabilize. This is basically your intuition exactly — consistency reduces update magnitude automatically.

Synaptic tagging and capture — when something is learned once it's fragile, held in short-term synaptic changes. When it's reinforced repeatedly it gets "captured" into stable long-term structural changes. Two timescales of plasticity in the same system.

The Hippocampus / Neocortex Split
This is the most directly relevant neuroscience for your architecture.

Hippocampus          Neocortex
Fast learning        Slow learning
Episode specific     General patterns
High plasticity      Low plasticity
Short term           Long term
The hippocampus learns new experiences rapidly — high learning rate, lots of plasticity. The neocortex integrates patterns slowly over many experiences — low learning rate, resistant to change.

They communicate during sleep — the hippocampus replays experiences to the neocortex, which slowly absorbs the general patterns while discarding episode-specific details. This is called memory consolidation.

Your system's equivalent:

Hippocampus → adapter, fast high-plasticity game-specific learning
Neocortex → base model, slow low-plasticity general patterns
Sleep replay → periodic distillation of adapter knowledge back into base
Critical Periods
The brain has periods of very high plasticity early in development — the visual cortex, language acquisition, motor skills. After the critical period plasticity drops dramatically and those representations become very stable.

This maps to your pretraining phase. The base model is in a "critical period" during multi-game training — high plasticity, forming general representations. After that the critical period closes and plasticity is mostly restricted to adapters.

The brain doesn't decide to close the critical period manually. It closes because the representations became consistent enough that further plasticity would be more destructive than helpful. That's the signal you'd want to automate.

Dopamine as the Learning Rate Signal
This is the really interesting one. Dopamine isn't just reward — it's a modulatory signal that controls how much learning happens right now.

Unexpected reward → dopamine spike → high plasticity → strong weight update
Expected reward → no dopamine → low plasticity → weak update
Unexpected punishment → dopamine dip → different kind of update
Your CLIP reward signal is basically synthetic dopamine. But real dopamine also modulates which circuits are plastic — it targets specific regions. Your system applies the same learning rate everywhere, which is cruder.

The Cerebellum vs Cortex Distinction
Another relevant split:

Cortex — slow, flexible, conscious, handles novel situations Cerebellum — fast, automatic, handles well-practiced motor sequences

When you first learn to ride a bike the cortex is heavily involved. Once it's mastered the cerebellum takes over and the cortex is freed up. The cortical representation doesn't get deleted — it gets compressed and handed off.

This maps to your control grammar idea really well. General motor primitives — timing, rhythm, spatial navigation — get compressed into fast automatic circuits. New games don't retrain those, they just wire new goals into the existing motor substrate.

The Actual Mechanism You're Looking For
In neuroscience it's called metaplasticity — plasticity of plasticity itself. Each synapse has a history of its own activity that determines how plastic it currently is.

The BCM rule (Bienenstock-Cooper-Munro) formalizes this:

If a synapse has been consistently active → raise the threshold for future changes
If it's been inconsistently or rarely active → lower the threshold
It's a self-regulating system. No external controller deciding what to freeze. Consistency self-stabilizes. Novelty self-opens.

How This Maps to Your Architecture
What you're actually describing is learned learning rates per parameter — sometimes called per-parameter adaptive plasticity. The closest ML implementations:

EWC — approximates this with Fisher information (how important is each weight) but it's computed once, not continuously updated
Online EWC — continuously updates importance estimates, closer to BCM
Meta-learning (MAML) — learns an initialization that's easy to fine-tune, implicit plasticity control
Neuromodulated plasticity in neural networks — literally tries to implement dopamine-like signals, very recent research area
None of them fully capture the brain's elegance. The brain is doing all of this locally, per-synapse, with no global controller. ML systems still largely rely on global learning rates with crude per-parameter scaling.

The Honest Gap
The brain's system is elegant because it evolved over millions of years to solve exactly this problem. Your ML system will be a coarser approximation — probably something like:

Track a running variance of each weight's gradient history
High consistent gradient → weight is actively learning, normal update
Low variance, small gradients → weight has settled, shrink learning rate
Near zero gradient consistently → effectively frozen
That's implementable. It's not as elegant as BCM but it's in the right spirit — the network deciding its own plasticity based on experience rather than you deciding it manually.

That's actually a genuinely novel training dynamic for this kind of RL system. Worth designing around.

