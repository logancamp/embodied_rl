Boring but critical. Don't rush this.

On The Continuous Transition
You're mostly right — it's the simplest stage. But unfreezing isn't quite the whole story.

What changes going continuous:

Frozen staged:
    Train on A until convergence → freeze → train B
    Clean boundary, clear when each phase ends

Continuous:
    Everything potentially updating all the time
    No clear phase boundary
    World model and adapters updating simultaneously
The subtle problem is when do you spawn a new adapter? In staged training you decide manually. In continuous training you need the system to detect automatically that it's in a new game context and route accordingly.

That detection mechanism is the only genuinely hard part of the transition. A few options:

Simple:    human flags game switch (still mostly automatic)
Medium:    cluster latent states, detect distribution shift
Hard:      fully automatic novelty-based adapter spawning
Start with simple. Flag the switch manually. Then automate it later.

The Other Wrinkle — Catastrophic Forgetting
Going continuous reintroduces the forgetting problem that staged training sidesteps. When the world model updates continuously on game B it will start drifting away from what it learned on game A.

This is exactly where plasticity earns its keep — but only after you've proven it works in Stage 3. So the order still holds, just know that Stage 4 without plasticity would likely show forgetting, and that's actually a useful thing to measure and document before adding plasticity back in.

Stage 4a: Continuous without plasticity → measure forgetting
Stage 4b: Continuous with plasticity → measure if forgetting reduces
That comparison is a clean result on its own.

So Your Full Roadmap
Stage 0: Vanilla Dreamer, one game, solid baseline
Stage 1: CLIP reward, same game, compare to Stage 0
Stage 2: LoRA, two games, measure transfer speedup
Stage 3: Plasticity, same two games, measure improvement
Stage 4a: Continuous, no plasticity, measure forgetting
Stage 4b: Continuous, with plasticity, measure forgetting reduction
Six clean experiments. Each answers one question. Each builds on the last. And you could publish at Stage 1, 2, or 3 if the results are good.

