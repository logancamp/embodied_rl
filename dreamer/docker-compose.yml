Good instinct — DreamerV3 is the most architecturally interesting and the one you'll actually be bending to fit your idea. Let me walk through it properly.

The Core Loop
DreamerV3 has three distinct components that train simultaneously but serve different roles:

Real Environment
      ↓
  World Model        ← learns to compress and predict
      ↓
  Imagine Trajectories
      ↓
  Actor + Critic     ← policy lives here
They're coupled but separable — which is important for your design.

World Model in Detail
This is the heart of it. Three sub-components:

RSSM (Recurrent State Space Model) The world model's memory. Maintains a latent state that has two parts:

Deterministic part — a GRU hidden state, carries memory across timesteps
Stochastic part — a sampled variable representing uncertainty about the world
This split is deliberate. Deterministic gives you smooth temporal continuity. Stochastic lets the model represent genuine uncertainty — "I don't know if that enemy is behind this wall."

Encoder CNN that squashes raw pixels into a compact embedding. This is your early visual layer — game-agnostic feature extraction.

Decoder / Predictor heads From the latent state it predicts:

Next frame (reconstruction)
Reward
Whether the episode has ended
It's trained to predict all three simultaneously. The reconstruction loss forces the latent space to capture visually meaningful information. The reward prediction forces it to capture what matters for behavior.

Why This Matters for Your Design
The latent state is where the interesting thing happens. By the time you're in latent space you're not dealing with pixels anymore — you're dealing with compressed game semantics.

This is exactly where your shared base should operate. The encoder and RSSM together are learning "what is happening in this game" in a game-agnostic way — movement, objects, threats, resources. That representation is potentially transferable.

Your LoRA adapters then sit on top of this, bending the policy head's interpretation of those latent states for a specific game's rules and reward structure.

The Imagination Process
Once the world model is trained, the actor-critic never touches real frames again during a training update. Instead:

Take a real latent state as a starting point
Ask the actor "what would you do here?"
Feed that action into the RSSM's deterministic transition — get next latent state
Ask the reward predictor "what reward would this give?"
Repeat for H steps (default 15)
Update actor-critic based on imagined trajectory
You're training policy on predicted experience inside the model's learned compression of the game. This is why 1 real frame can generate 15 training steps.

DreamerV3 Specific Improvements Over V1/V2
A few things changed in V3 that matter practically:

Symlog encoding Handles reward scales across very different games without manual tuning. Compresses large reward values logarithmically. This matters for you because CLIP rewards and game rewards will be on completely different scales — symlog helps stabilize that automatically.

KL balancing Controls how much the stochastic latent is allowed to deviate from the prior. Keeps the latent space from collapsing or exploding during training. V3 made this robust enough to work across games without per-game tuning.

Fixed hyperparameters This is actually the headline claim of V3 — same hyperparameters work across Atari, continuous control, Minecraft. That's directly relevant to you because your whole thesis is a base model that generalizes.

Where You'd Modify It
Given your idea, three natural intervention points:

1. The Encoder Currently a monolithic CNN. You might want this to be shared and frozen after base training — like a universal visual feature extractor. This is your CLIP alignment point — you could potentially initialize or constrain this with CLIP embeddings.

2. The RSSM This is trickier to adapter-ize because it's recurrent and stateful. But the deterministic hidden state is essentially your "working memory of the game" — a natural place to inject game-specific biases via a small adapter on the GRU.

3. The Actor/Critic heads Cleanest place for LoRA adapters. These are relatively shallow MLPs that map from latent state to actions and values. Game-specific behavior lives here. Swap adapters here per game and you're most of the way to your architecture.

The One Thing Dreamer Doesn't Solve for You
Its reward signal assumes a clean scalar from the environment. Your CLIP-based reward is noisy, slow, and potentially inconsistent. The reward predictor inside the world model will try to learn to predict your CLIP signal — which means if CLIP is inconsistent, the world model learns inconsistent dynamics.

This is your biggest integration challenge. Worth thinking about whether CLIP reward trains the world model or only the actor-critic, keeping the world model's reward head tied to something more stable.

What's your instinct on where to start modifying — the encoder, the RSSM, or the actor/critic head? That'll shape the whole design conversation.

