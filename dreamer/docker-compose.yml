What To Do On the Windows Machine
Prerequisites — install these manually first:

Docker Desktop for Windows — enable WSL2 backend in settings
NVIDIA drivers for Windows (standard game drivers are fine, don't install inside WSL)
NVIDIA Container Toolkit — lets Docker see your GPU
Then copy the whole dreamer/ folder to the Windows machine and inside WSL2:

bash
chmod +x setup_windows.sh
./setup_windows.sh    # checks everything, builds image, runs sanity check
Once that passes:

bash
make docker-train     # full S-model benchmark run, logs saved to ./logs/
The logs/ directory is mounted as a volume so your results persist after the container exits and you can copy them back to Mac.

One important note — if you're on Windows but not using WSL2, you can also just open Docker Desktop, which has a built-in terminal. The make docker-train command works there too.


