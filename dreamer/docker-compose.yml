Recognized screen-capture game-playing AI as established research domain
Yes, this is very doable! It's essentially the same architecture behind DeepMind's Atari-playing agents and modern "computer use" AI systems. Here's the landscape:

Screen Capture
Python libraries for grabbing frames:

mss — fastest, cross-platform, can capture a specific monitor or window region
pygetwindow + mss — find a window by name, get its bounding box, capture just that region
pyautogui — simpler but slower; good for prototyping
win32gui (Windows only) — most precise window targeting
python
import mss
import numpy as np

with mss.mss() as sct:
    monitor = {"top": 100, "left": 0, "width": 800, "height": 600}
    frame = np.array(sct.grab(monitor))  # BGRA numpy array
You can hit 60+ FPS easily with mss.

AI Architecture Options
1. Classical RL (train from scratch)
Feed frames into a CNN → policy network
Frameworks: Stable-Baselines3, Ray RLlib
Works well for games with clear reward signals (score, health bar via OCR/pixel sampling)
Slow to train, but fully autonomous
2. Vision-Language Model (VLM) as the "brain")
Send frames to GPT-4o, Claude, or Gemini via API
Ask: "Here is the current game frame. What action should I take?"
Output actions via pyautogui or pynput
Slower (API latency) but works on any game with zero training
This is essentially what Claude's "computer use" feature does
3. Hybrid: Fast local model + VLM planner
Local model (e.g., fine-tuned YOLO for object detection) handles real-time perception
VLM handles high-level strategy on keyframes
Action Output
python
import pyautogui

pyautogui.press('space')        # keyboard
pyautogui.click(x, y)          # mouse
pyautogui.moveTo(x, y, duration=0.1)
Suggested Stack to Start
Component	Tool
Screen capture	mss
Frame → model	Anthropic/OpenAI VLM API
Actions	pyautogui or pynput
Window targeting	pygetwindow
Loop control	asyncio or a simple game loop
